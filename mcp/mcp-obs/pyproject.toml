[project]
name = "mcp-obs"
version = "1.0.0"
description = "MCP server for observability tools (VictoriaLogs, VictoriaTraces)"
authors = [{name = "Student"}]
dependencies = [
    "mcp>=1.26.0",
    "httpx>=0.28.0",
    "pydantic>=2.12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_obs"]
